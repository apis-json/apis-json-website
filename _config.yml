name: APIs.json
description: The open source API discovery format.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://apisjson.org

node: explore

alert:
  enabled: true
  type: info
  message: 'New — render any APIs.json as browsable docs with the <a href="https://documentation.apicommons.org/" class="alert-link">API Documentation</a> tool from API Commons.'

keywords:
  - APIs.json
  - API discovery
  - API index
  - machine-readable APIs
  - API operations
  - API catalog
future: false

version:      1.1.1
author:
  name:       'Kin Lane'
  email:      'info@apievangelist.com'
markdown:     kramdown

permalink: /:categories/:year/:month/:day/:title/
exclude: [".rvmrc", ".rbenv-version", "README.md", "Rakefile", "changelog.md", ".DS_Store"]

paginate: 25
paginate_path: "/blog/page:num"

categories_path : /categories.html
tags_path : /tags.html

github_org: apis-json
github_repo: apis-json-website

search_local: true

collections:
  common:
    output: true
    permalink: /common/:path/ 
  schema:
    output: true
    permalink: /schema/:path/        

defaults:

  - scope:
      path:         ""
      type:         common
    values:
      layout:       common
  - scope:
      path:         ""
      type:         schema
    values:
      layout:       schema      
